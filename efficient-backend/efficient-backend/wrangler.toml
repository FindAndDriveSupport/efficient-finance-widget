# wrangler.toml — E-fficient Finance Widget — Cloudflare Worker config
# Deploy: wrangler deploy
# Secrets: wrangler secret put SECRET_NAME

name        = "efficient-finance-widget"
main        = "workers/worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ── KV Namespace ──────────────────────────────────────────────
# Used to cache Seriti bearer tokens across Worker instances.
# Create: wrangler kv:namespace create SERITI_CACHE
# Then paste the id below.

[[kv_namespaces]]
binding  = "SERITI_CACHE"
id       = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

# ── Environment Variables (non-secret) ───────────────────────
[vars]
WORKER_ENV = "production"

# ── Secrets (set via wrangler secret put) ────────────────────
# DO NOT put real values here. Use: wrangler secret put SECRET_NAME
#
# Required secrets:
#   wrangler secret put SERITI_API_KEY
#   wrangler secret put SERITI_API_SECRET
#   wrangler secret put EDITH_COMPANY_CODE
#   wrangler secret put EDITH_COMPANY_PASS

# ── Development environment ───────────────────────────────────
[env.development]
name = "efficient-finance-widget-dev"
[env.development.vars]
WORKER_ENV = "development"

# ── Routes ───────────────────────────────────────────────────
# Uncomment and set your Cloudflare zone/domain:
# [[routes]]
# pattern = "api.yourwidgetdomain.co.za/*"
# zone_name = "yourwidgetdomain.co.za"
