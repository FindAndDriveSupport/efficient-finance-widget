name: Sync from Dev

on:
  repository_dispatch:
    types: [sync-from-dev]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout prod repo (efficient-finance-widget)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          path: prod

      - name: Checkout dev repo (efficient-finance-widget-dev)
        uses: actions/checkout@v4
        with:
          repository: FindAndDriveSupport/efficient-finance-widget-dev
          token: ${{ secrets.GH_PAT }}
          path: dev

      - name: Sync files from dev to prod
        run: |
          rsync -av --delete \
            --exclude='.git/' \
            --exclude='node_modules/' \
            --exclude='.env' \
            --exclude='.dev.vars' \
            --exclude='wrangler.toml' \
            --exclude='workers/dealers/dealers.config.js' \
            --exclude='.github/' \
            dev/ prod/

      - name: Check for changes
        id: changes
        run: |
          cd prod
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          cd prod
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: sync latest changes from efficient-finance-widget-dev"
          git push