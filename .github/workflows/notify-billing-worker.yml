name: Notify billing-worker on dealers.config.js change

on:
  push:
    branches: [main]
    paths:
      - 'workers/dealers/dealers.config.js'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger sync in billing-worker
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/FindAndDriveSupport/billing-worker/dispatches \
            -d '{"event_type":"sync-dealers-config"}'